version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: crm-saas-postgres
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # init.sql rimosso - TypeORM crea le tabelle automaticamente
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crm-saas-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: crm-saas-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=crm
      - DB_PASSWORD=crm_password
      - DB_NAME=crm_db
      - JWT_SECRET=super-secret-key-change-in-production
      - REDIS_URL=redis://redis:6379
      - GOOGLE_PLACES_API_KEY=INSERISCI_QUI_LA_TUA_API_KEY
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: crm-saas-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data:
